<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>Projekt M - Poisson Disc Sampling</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>



</head>

<body>
    <img src="kolor_bez_nazwy_logo_filia_wilno_300.png" alt="Logo" class="top-left-img">



    <h1 class="title">Poisson Disc Sampling</h1>

    <div id="canvases-wrapper">
        <div id="canvas-container" class="canvas-box"></div>
    </div>

    <div id="ui-container">

        <div class="control-group">
            <button class="btn" onclick="togglePause()">Start / Pause</button>
            <button class="btn" onclick="resetAlgorithm()">Reset</button>
            <button class="btn" onclick="changeCanvasSize()">Change Size</button>
        </div>

        <div class="slider-group">
            <label class="slider-label">
                Szerokość (Width):
                <input type="range" id="width-slider" min="200" max="1000" value="400">
            </label>
            <label class="slider-label">
                Wysokość (Height):
                <input type="range" id="height-slider" min="200" max="1000" value="400">
            </label>
            <label class="slider-label">
                Szybkość (Iteracje):
                <input type="range" id="speed-slider" min="1" max="200" value="1">
            </label>
        </div>

        <div class="control-group">
            <label class="checkbox-label">
                <input type="checkbox" id="show-random"> Show Random Point Generation
            </label>
        </div>

    </div>


    <script src="sketch.js"></script>
</body>

</html>
